repos:
-   repo: local
    hooks:
    -   id: check-version
        name: check-version
        entry: python3 scripts/check_version.py
        language: python
        pass_filenames: false
        always_run: true
    -   id: create-package
        name: create-package
        entry: python3 scripts/create_package.py
        language: python
        pass_filenames: false
        files: ^projects/app/(version\.json|manifest\..*\.json)$
    -   id: eslint
        name: eslint
        entry: npx eslint .
        language: system
        pass_filenames: false
        always_run: true
-   repo: local
    hooks:
    -   id: verify-submission-language
        name: verify-submission-language
        entry: python3 scripts/verify_submission_language.py --commit-msg-file
        language: python
        stages: [commit-msg]
    -   id: stylelint
        name: stylelint
        entry: npx stylelint "**/*.css"
        language: system
        pass_filenames: false
        always_run: true
    -   id: jest
        name: jest
        entry: node --experimental-vm-modules ./node_modules/.bin/jest
        language: system
        pass_filenames: false
        always_run: true

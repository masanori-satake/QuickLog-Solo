ci:
    autofix_commit_msg: '[pre-commit.ci] auto fixes from pre-commit.com hooks'
    autofix_prs: true
    autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
    autoupdate_schedule: weekly
    skip: [eslint, stylelint, jest, create-package]
    submodules: false

repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files

-   repo: local
    hooks:
    -   id: check-root-files
        name: check-root-files
        entry: python scripts/check_root_files.py
        language: python
        pass_filenames: false
        always_run: true
    -   id: verify-project-policies
        name: verify-project-policies
        entry: python scripts/verify_project_policies.py
        language: python
        pass_filenames: false
        always_run: true
    -   id: audit-production-dependencies
        name: audit-production-dependencies
        entry: python scripts/audit_production_dependencies.py
        language: python
        pass_filenames: false
        always_run: true
    -   id: audit-localization-mixing
        name: audit-localization-mixing
        entry: python scripts/audit_localization_mixing.py
        language: python
        pass_filenames: false
        always_run: true
    -   id: check-version
        name: check-version
        entry: python scripts/check_version.py
        language: python
        pass_filenames: false
        always_run: true
    -   id: create-package
        name: create-package
        entry: python scripts/create_package.py
        language: python
        pass_filenames: false
        files: ^projects/app/(version\.json|manifest\..*\.json)$
    -   id: verify-submission-language
        name: verify-submission-language
        entry: python scripts/language_check.py --commit-msg-file
        language: python
        stages: [commit-msg]
    -   id: eslint
        name: eslint
        entry: npx eslint
        language: system
        files: \.[jt]sx?$
        types: [file]
    -   id: stylelint
        name: stylelint
        entry: npx stylelint
        language: system
        files: \.css$
    -   id: jest
        name: jest
        entry: npm test
        language: system
        pass_filenames: false
        always_run: true

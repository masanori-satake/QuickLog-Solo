<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickLog-Solo</title>
    <link rel="stylesheet" href="css/m3-theme.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icon.svg">
    <meta name="theme-color" content="#2563eb">
</head>
<body class="theme-light accent-blue">
    <div id="app">
        <header>
            <div id="header-btns">
                <button id="copy-report-btn" title="日報コピー">📋</button>
                <button id="copy-aggregation-btn" title="集計コピー">📊</button>
                <button id="settings-toggle" title="設定">⚙️</button>
            </div>
        </header>

        <main>
            <section id="category-section">
                <div id="category-list">
                    <!-- カテゴリボタンがここに動的に追加される -->
                </div>
                <div id="category-pagination" class="hidden">
                    <!-- ページインジケーター -->
                </div>
            </section>

            <section id="control-section">
                <div id="timer-container">
                    <div id="current-task-display">
                        <div id="current-task-display-base">
                            <h2 id="current-task-name">-</h2>
                            <div class="timer-box">
                                <span id="status-label">⏹</span>
                                <div id="elapsed-time" class="hidden">00:00:00</div>
                            </div>
                        </div>

                        <div id="current-task-display-overlay">
                            <h2 id="current-task-name-overlay">-</h2>
                            <div class="timer-box">
                                <span id="status-label-overlay">⏹</span>
                                <div id="elapsed-time-overlay" class="hidden">00:00:00</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="stop-btn-box">
                    <button id="pause-btn" disabled><span class="btn-text">一時停止</span><span class="btn-icon">⏸️</span></button>
                    <button id="end-btn" disabled><span class="btn-text">終了</span><span class="btn-icon">⏹️</span></button>
                </div>
            </section>

            <section id="log-section">
                <ul id="log-list">
                    <!-- ログアイテムがここに動的に追加される -->
                </ul>
            </section>
        </main>

        <!-- Settings Popup -->
        <div id="settings-popup" class="modal hidden">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                <h2>設定</h2>

                <div class="tabs">
                    <button class="tab-btn active" data-tab="general">
                        <span class="tab-text">一般</span><span class="tab-icon">⚙️</span>
                    </button>
                    <button class="tab-btn" data-tab="categories">
                        <span class="tab-text">カテゴリ</span><span class="tab-icon">📂</span>
                    </button>
                    <button class="tab-btn" data-tab="maintenance">
                        <span class="tab-text">メンテナンス</span><span class="tab-icon">🛠️</span>
                    </button>
                    <button class="tab-btn" data-tab="about">
                        <span class="tab-text">About</span><span class="tab-icon">ℹ️</span>
                    </button>
                </div>

                <div id="general-tab" class="tab-content">
                    <div class="setting-item">
                        <label>テーマ</label>
                        <select id="theme-select">
                            <option value="system">システム設定に従う</option>
                            <option value="light">ライトモード</option>
                            <option value="dark">ダークモード</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>アクセントカラー</label>
                        <div id="accent-colors">
                            <button class="accent-dot blue" data-accent="blue"></button>
                            <button class="accent-dot green" data-accent="green"></button>
                            <button class="accent-dot orange" data-accent="orange"></button>
                            <button class="accent-dot red" data-accent="red"></button>
                        </div>
                    </div>
                    <div class="setting-item">
                        <label>表示フォント</label>
                        <select id="font-select">
                            <!-- JSで生成 -->
                        </select>
                    </div>
                    <div class="setting-item">
                        <button id="export-csv-btn">CSVエクスポート</button>
                        <button id="import-csv-btn">CSVインポート</button>
                        <input type="file" id="csv-file-input" style="display:none" accept=".csv">
                    </div>
                </div>

                <div id="categories-tab" class="tab-content hidden">
                    <div id="category-editor-list">
                        <!-- カテゴリ編集アイテムがここに動的に追加される -->
                    </div>
                    <div id="add-category-box-settings">
                        <input type="text" id="new-category-name-settings" placeholder="新しいカテゴリ...">
                        <button id="add-category-btn-settings">+</button>
                    </div>
                </div>

                <div id="about-tab" class="tab-content hidden">
                    <div class="setting-item">
                        <label>バージョン</label>
                        <p id="version-display"></p>
                    </div>
                    <div class="setting-item">
                        <label>開発者</label>
                        <p>Masanori SATAKE</p>
                    </div>
                    <div class="setting-item">
                        <label>QuickLog-Solo について</label>
                        <p style="font-size: 0.85rem; line-height: 1.6; margin-bottom: 0.5rem;">
                            本アプリは、標準的なウェブ技術（HTML5, CSS3, Vanilla JS）のみで構築された、プライバシー重視のミニマリストな作業ログツールです。
                        </p>
                        <p style="font-size: 0.85rem; line-height: 1.6; margin-bottom: 0.5rem;">
                            すべてのデータはブラウザ内の IndexedDB にのみ保存され、外部サーバーへの送信は行われません。サイドパネルで常に作業の傍らに。
                        </p>
                        <p style="font-size: 0.85rem; line-height: 1.6;">
                            外部ライブラリを一切使用せず、セキュアで軽量な動作を実現しています。
                        </p>
                    </div>
                </div>

                <div id="maintenance-tab" class="tab-content hidden">
                    <div class="setting-item">
                        <label>ログの削除</label>
                        <button id="clear-logs-btn" class="danger-btn" style="width: 100%;">ログをすべて削除</button>
                    </div>
                    <div class="setting-item">
                        <label>設定とカテゴリの初期化</label>
                        <p style="font-size: 0.75rem; margin-bottom: 0.5rem; color: var(--muted-color);">
                            ログは維持されます。
                        </p>
                        <button id="reset-cat-settings-btn" style="width: 100%;">カテゴリ・設定を初期化</button>
                    </div>
                    <div class="setting-item">
                        <label>設定のみの初期化</label>
                        <p style="font-size: 0.75rem; margin-bottom: 0.5rem; color: var(--muted-color);">
                            ログとカテゴリは維持されます。
                        </p>
                        <button id="reset-settings-btn" style="width: 100%;">設定のみを初期化</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="confirm-modal" class="modal hidden">
            <div class="modal-content">
                <p id="confirm-message">本当に作業を終了しますか？</p>
                <div class="confirm-btns">
                    <button id="confirm-cancel-btn">キャンセル</button>
                    <button id="confirm-ok-btn">OK</button>
                </div>
            </div>
        </div>

        <div id="toast" class="hidden">コピーしました！</div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>

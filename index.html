<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickLog-Solo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-light accent-blue">
    <div id="app">
        <header>
            <h1>QuickLog-Solo</h1>
            <button id="settings-toggle" title="設定">⚙️</button>
        </header>

        <main>
            <section id="category-section">
                <div id="category-list">
                    <!-- カテゴリボタンがここに動的に追加される -->
                </div>
                <div id="add-category-box">
                    <input type="text" id="new-category-name" placeholder="新しいカテゴリ...">
                    <button id="add-category-btn">+</button>
                </div>
            </section>

            <section id="control-section">
                <div id="current-task-display">
                    <span id="status-label">待機中</span>
                    <h2 id="current-task-name">-</h2>
                </div>
                <button id="stop-btn" disabled>ストップ</button>
            </section>

            <section id="log-section">
                <h3>最近のログ</h3>
                <ul id="log-list">
                    <!-- ログアイテムがここに動的に追加される -->
                </ul>
                <button id="more-logs-btn">More...</button>
                <div id="extra-logs" class="hidden">
                    <ul id="extra-log-list"></ul>
                </div>
            </section>

            <section id="action-section">
                <button id="copy-report-btn">日報コピー</button>
                <button id="copy-aggregation-btn">集計コピー</button>
            </section>
        </main>

        <footer>
            <button id="info-btn">?</button>
        </footer>

        <!-- Info Popup -->
        <div id="info-popup" class="modal hidden">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                <h2>QuickLog-Solo について</h2>
                <p><strong>保存先:</strong> ブラウザ内 IndexedDB (Local Only)</p>
                <p><strong>通信:</strong> 更新チェック以外、外部通信なし</p>
                <p><strong>仕組み:</strong> PWA / Service Worker によるオフライン動作</p>
                <hr>
                <p>データはあなたのデバイスにのみ保存されます。安心してご利用ください。</p>
            </div>
        </div>

        <!-- Settings Popup -->
        <div id="settings-popup" class="modal hidden">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                <h2>設定</h2>
                <div class="setting-item">
                    <label>テーマ</label>
                    <select id="theme-select">
                        <option value="system">システム設定に従う</option>
                        <option value="light">ライトモード</option>
                        <option value="dark">ダークモード</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>アクセントカラー</label>
                    <div id="accent-colors">
                        <button class="accent-dot blue" data-accent="blue"></button>
                        <button class="accent-dot green" data-accent="green"></button>
                        <button class="accent-dot orange" data-accent="orange"></button>
                        <button class="accent-dot red" data-accent="red"></button>
                    </div>
                </div>
                <div class="setting-item">
                    <button id="export-csv-btn">CSVエクスポート</button>
                    <button id="import-csv-btn">CSVインポート</button>
                    <input type="file" id="csv-file-input" style="display:none" accept=".csv">
                </div>
            </div>
        </div>

        <div id="toast" class="hidden">コピーしました！</div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>

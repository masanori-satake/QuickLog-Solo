name: "Bug Report / 不具合報告"
description: "Report a bug to help us improve. / 不具合を報告して改善に協力してください。"
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ご報告ありがとうございます！不具合の特定をスムーズに行うため、以下の情報の提供をお願いします。
        Thank you for reporting! Please provide the following information to help us identify the issue.
  - type: dropdown
    id: target-app
    attributes:
      label: "Target Application / 対象アプリ"
      options:
        - "QuickLog-Solo (Main Extension)"
        - "QL-Animation Studio"
        - "Landing Page / index.html"
        - "Other / その他"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: "Version / バージョン"
      description: "Check in 'Settings > About' / 「設定 > About」から確認できます"
      placeholder: "v0.19.0"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: "OS & Browser / OSとブラウザ"
      placeholder: "Windows 11 / Chrome 120"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "Reproduction Steps / 再現手順"
      description: "How did it happen? / 何をしたら発生しましたか？"
      placeholder: |
        1. Click on ...
        2. Change setting to ...
        3. The issue appears ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior / 期待される挙動"
      description: "What did you expect to happen? / 本来どうなるべきでしたか？"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior / 実際の挙動"
      description: "What actually happened? / 実際に何が起きましたか？"
    validations:
      required: true
  - type: markdown
    attributes:
      value: "### Diagnostic Information / 調査用情報"
  - type: input
    id: stats
    attributes:
      label: "App Statistics / アプリの状態"
      description: "Found in 'Settings > About' / 「設定 > About」に表示されています"
      placeholder: "Logs: 120, Categories: 15"
  - type: dropdown
    id: backup-status
    attributes:
      label: "Local Backup / ローカルバックアップ"
      options:
        - "Disabled / 無効"
        - "Enabled (Success) / 有効 (成功)"
        - "Enabled (Dirty/Error) / 有効 (保留/エラー)"
        - "Not sure / 不明"
  - type: dropdown
    id: lang-setting
    attributes:
      label: "Language Setting / 使用言語設定"
      options:
        - "Auto (Browser) / 自動"
        - "English"
        - "Japanese / 日本語"
        - "Other / その他"
  - type: markdown
    attributes:
      value: |
        #### For QL-Animation Studio bugs / スタジオの不具合の場合
  - type: input
    id: studio-config
    attributes:
      label: "Studio Config / スタジオの設定"
      placeholder: "Mode: Canvas, FG Avoidance: Jump"
  - type: textarea
    id: studio-console
    attributes:
      label: "Studio Console Logs / スタジオのコンソールログ"
      description: "Paste logs from the bottom console if applicable / スタジオ下部のコンソール出力を貼り付けてください"
  - type: textarea
    id: additional-info
    attributes:
      label: "Additional Context / 補足情報"
      description: "Screenshots or data files. **Please redact any personal info before attaching.** / スクリーンショットやデータファイル。**個人情報が含まれる場合は、必ず伏せた上で添付してください。**"

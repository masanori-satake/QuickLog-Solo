name: OSS Fragment Audit (SCANOSS)

on:
  push:
    branches: [ main ]
    paths:
      - 'projects/**'
      - 'shared/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'projects/**'
      - 'shared/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  actions: read

jobs:
  scanoss-audit:
    name: SCANOSS Code Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Run SCANOSS Code Scan
      id: scanoss-code-scan-step
      uses: scanoss/code-scan-action@v1
      with:
        scanPath: .
        policies: undeclared

name: Auto Release with ZIP Asset

on:
  push:
    tags:
      - 'v*.*.*' # セマンティックバージョニングのタグをトリガーとする
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to release (e.g. v0.26.1)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write # Releaseの作成およびアセットのアップロードに必須

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright Dependencies (if cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Install Python Playwright
        run: pip install playwright

      - name: Build packages
        run: npm run build

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2.4.0
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          generate_release_notes: true
          files: releases/*.zip

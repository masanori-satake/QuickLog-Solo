name: "テスト: コード品質 (Lint/Unit) (Test: Code Quality)"

on:
  push:
    branches: [ main ]
    paths:
      - 'projects/**'
      - 'shared/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'eslint.config.js'
      - '.stylelintrc.json'
  pull_request:
    branches: [ main ]
    paths:
      - 'projects/**'
      - 'shared/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'eslint.config.js'
      - '.stylelintrc.json'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@v45
      with:
        files: |
          projects/**
          shared/**
          tests/**
          package.json
          eslint.config.js
          .stylelintrc.json

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci
      timeout-minutes: 5

    - name: Run ESLint
      if: steps.changed-files.outputs.any_changed == 'true' || github.event_name == 'workflow_dispatch'
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          npx eslint .
        else
          JS_FILES=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | grep -E '\.(js|cjs)$' || true)
          if [ -n "$JS_FILES" ]; then
            npx eslint $JS_FILES
          else
            echo "No JS files changed, skipping ESLint."
          fi
        fi
      timeout-minutes: 5

    - name: Run Stylelint
      if: steps.changed-files.outputs.any_changed == 'true' || github.event_name == 'workflow_dispatch'
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          npx stylelint "**/*.css"
        else
          CSS_FILES=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | grep '\.css$' || true)
          if [ -n "$CSS_FILES" ]; then
            npx stylelint $CSS_FILES
          else
            echo "No CSS files changed, skipping Stylelint."
          fi
        fi
      timeout-minutes: 5

    - name: Run Jest tests
      if: steps.changed-files.outputs.any_changed == 'true' || github.event_name == 'workflow_dispatch'
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          npm test
        else
          JS_FILES=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | grep -E '\.(js|cjs)$' || true)
          if [ -n "$JS_FILES" ]; then
            npm test -- --findRelatedTests $JS_FILES --passWithNoTests
          else
            echo "No JS files changed, running all tests as fallback."
            npm test
          fi
        fi
      timeout-minutes: 5

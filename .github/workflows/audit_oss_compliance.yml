name: "監査: OSSコンプライアンス (Audit: OSS Compliance)"

on:
  push:
    branches: [ main ]
    paths:
      - 'projects/**'
      - 'shared/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [ main ]
    paths:
      - 'projects/**'
      - 'shared/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  actions: read

jobs:
  scanoss-audit:
    name: SCANOSS Code Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run SCANOSS Code Scan
      id: scanoss-code-scan-step
      uses: scanoss/code-scan-action@v1
      with:
        scanPath: projects
        policies: undeclared
        scanossSettings: true
        settingsFilepath: scanoss.json

name: OSSコンプライアンス監査 (Audit OSS Compliance)

on:
  push:
    branches: [ main ]
    paths:
      - 'projects/**'
      - 'shared/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'projects/**'
      - 'shared/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  actions: read

jobs:
  scanoss-audit:
    name: SCANOSS Code Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: List files to be scanned (Debug)
      run: |
        echo "Listing files that will be scanned by SCANOSS (not ignored by .scanossignore):"
        python3 -c "
        import os, fnmatch
        def load_ignore():
            if not os.path.exists('.scanossignore'): return []
            with open('.scanossignore') as f:
                return [l.strip() for l in f if l.strip() and not l.startswith('#')]
        patterns = load_ignore()
        def is_ignored(path):
            path = path.replace(os.sep, '/')
            if path.startswith('./'): path = path[2:]
            for p in patterns:
                p_match = p.rstrip('/')
                if fnmatch.fnmatch(path, p) or fnmatch.fnmatch(path, p_match) or fnmatch.fnmatch(os.path.basename(path), p): return True
                parts = path.split('/')
                for part in parts:
                    if fnmatch.fnmatch(part, p) or fnmatch.fnmatch(part, p_match): return True
            return False
        for root, dirs, files in os.walk('.'):
            dirs[:] = [d for d in dirs if not is_ignored(os.path.join(root, d))]
            for f in files:
                p = os.path.join(root, f)
                if not is_ignored(p): print(f'  {p}')
        "

    - name: Run SCANOSS Code Scan
      id: scanoss-code-scan-step
      uses: scanoss/code-scan-action@v1
      with:
        scanPath: .
        policies: undeclared
        scanossSettings: true
        settingsFilepath: scanoss.json

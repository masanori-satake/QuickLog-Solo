name: "リリース: Webアプリケーションのデプロイ (Release: Deploy Web Applications)"

on:
  push:
    branches:
      - main
    paths:
      - 'projects/**'
      - 'shared/**'
      - 'scripts/**'
      - 'tests/**'
      - 'releases/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vercel.json'
      - '.github/workflows/release_web_deploy.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'projects/**'
      - 'shared/**'
      - 'scripts/**'
      - 'tests/**'
      - 'releases/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vercel.json'
      - '.github/workflows/release_web_deploy.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        run: python3 -m playwright install chromium --with-deps

      - name: Install Python Playwright
        run: pip install playwright

      - name: Build packages (Generates ZIPs and Branded Icons)
        run: npm run build

      - name: Prepare Deployment Directory
        run: |
          mkdir dist_web
          cp vercel.json dist_web/
          mkdir -p dist_web/projects
          cp -r projects/web dist_web/projects/
          cp -r projects/app dist_web/projects/
          cp -r projects/category-editor dist_web/projects/
          cp -r projects/studio dist_web/projects/
          cp -r shared dist_web/
          cp -r releases dist_web/

          # Remove symlinks in dist_web to ensure they are real directories/files for Vercel
          find dist_web -type l -delete

      - name: Verify build artifacts
        run: |
          ls -R dist_web/releases/
          [ -f dist_web/shared/assets/icon128.png ] || (echo "Icons missing" && exit 1)
          [ -f dist_web/releases/QuickLog-Solo-Chrome-Dev.zip ] || (echo "Dev ZIP missing" && exit 1)
          [ -f dist_web/projects/web/index.html ] || (echo "Landing page missing" && exit 1)

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v42.2.0
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ${{ github.workspace }}/dist_web
          target: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}

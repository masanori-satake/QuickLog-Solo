name: "更新: ガイド用スクリーンショット (Update: Guide Screenshots)"

on:
  push:
    branches: [ main ]
    paths:
      - 'projects/**'
      - 'scripts/**'
      - 'projects/web/guide.html'
      - 'package.json'
  pull_request:
    branches: [ main ]
    paths:
      - 'projects/**'
      - 'scripts/**'
      - 'projects/web/guide.html'
      - 'package.json'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref || github.ref }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install Playwright Browsers
      run: python3 -m playwright install chromium --with-deps

    - name: Update screenshots
      run: npm run update-guide-images

    - name: Commit and push changes (PR)
      if: github.event_name == 'pull_request'
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: ガイド用スクリーンショットの更新"
        file_pattern: 'shared/assets/guide/*.png'
        branch: ${{ github.head_ref }}

    - name: Create Pull Request (Manual/Main)
      if: github.event_name != 'pull_request'
      uses: peter-evans/create-pull-request@v7.0.5
      with:
        commit-message: "chore: ガイド用スクリーンショットの更新"
        add-paths: 'shared/assets/guide/*.png'
        branch: "chore/update-guide-screenshots"
        title: "chore: ガイド用スクリーンショットの更新"
        body: "自動生成されたガイド用スクリーンショットの更新です。"

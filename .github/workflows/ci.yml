name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@v47
      with:
        files: |
          src/**
          tests/**
          scripts/**
          package.json
          eslint.config.js
          .stylelintrc.json

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm install
      timeout-minutes: 5

    - name: Check root directory cleanliness
      run: python3 scripts/check_root_files.py
      timeout-minutes: 2

    - name: Check version consistency
      if: steps.changed-files.outputs.any_changed == 'true' || github.event_name == 'workflow_dispatch'
      run: python3 scripts/check_version.py
      timeout-minutes: 2

    - name: Verify version impact
      if: (github.event_name == 'pull_request' && steps.changed-files.outputs.any_changed == 'true') || github.event_name == 'workflow_dispatch'
      run: python3 scripts/verify_version_impact.py
      timeout-minutes: 2

    - name: Run ESLint
      if: steps.changed-files.outputs.any_changed == 'true' || github.event_name == 'workflow_dispatch'
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          npx eslint .
        else
          JS_FILES=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | grep -E '\.(js|cjs)$' || true)
          if [ -n "$JS_FILES" ]; then
            npx eslint $JS_FILES
          else
            echo "No JS files changed, skipping ESLint."
          fi
        fi
      timeout-minutes: 5

    - name: Run Stylelint
      if: steps.changed-files.outputs.any_changed == 'true' || github.event_name == 'workflow_dispatch'
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          npx stylelint "**/*.css"
        else
          CSS_FILES=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | grep '\.css$' || true)
          if [ -n "$CSS_FILES" ]; then
            npx stylelint $CSS_FILES
          else
            echo "No CSS files changed, skipping Stylelint."
          fi
        fi
      timeout-minutes: 5

    - name: Run Jest tests
      if: steps.changed-files.outputs.any_changed == 'true' || github.event_name == 'workflow_dispatch'
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          npm test
        else
          JS_FILES=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | grep -E '\.(js|cjs)$' || true)
          if [ -n "$JS_FILES" ]; then
            npm test -- --findRelatedTests $JS_FILES --passWithNoTests
          else
            echo "No JS files changed, running all tests as fallback."
            npm test
          fi
        fi
      timeout-minutes: 5

    - name: Cache Playwright browsers
      if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
      uses: actions/cache@v5
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install Playwright Browsers
      if: (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') && steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install chromium --with-deps
      timeout-minutes: 5

    - name: Install Playwright Dependencies (if cache hit)
      if: (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') && steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps chromium
      timeout-minutes: 2

    - name: Start local server
      if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
      run: python3 -m http.server 8080 &

    - name: Wait for local server
      if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
      run: npx wait-on http://localhost:8080 -t 30000

    - name: Run E2E tests
      if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
      run: npm run test:e2e -- --grep-invert "Animation Quality Evaluation"
      timeout-minutes: 10

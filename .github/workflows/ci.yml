name: "CI: 継続的インテグレーション (Continuous Integration)"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths:
      - 'projects/**'
      - 'shared/**'
      - 'tests/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'eslint.config.js'
      - '.stylelintrc.json'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  security-events: write
  contents: read

jobs:
  audit-and-quality:
    name: 監査と品質管理 (Audit and Quality)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: |
            projects/**
            shared/**
            tests/**
            scripts/**
            package.json

      - name: Get app-related changed files
        id: app-changes
        uses: tj-actions/changed-files@v45
        with:
          files: |
            projects/app/**
            shared/**

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 1. ルートディレクトリのクリーンネス確認 (Root Directory Cleanliness)
        run: python3 scripts/check_root_files.py

      - name: 2. プロジェクトポリシー確認 (Project Policy Guard)
        run: python3 scripts/verify_project_policies.py

      - name: 3. PRコメント使用言語確認 (PR Language Check)
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf '%s' "$PR_TITLE" | python3 scripts/language_check.py
          if [ -n "$PR_BODY" ]; then
            printf '%s' "$PR_BODY" | python3 scripts/language_check.py
          else
            echo "PR body is empty. Skipping description language check."
          fi

      - name: 4. バージョンの一貫性確認 (Version Consistency)
        if: steps.changed-files.outputs.any_changed == 'true' || github.event_name == 'workflow_dispatch'
        run: python3 scripts/check_version.py

      - name: 5. バージョン影響評価 (Version Impact)
        if: (github.event_name == 'pull_request' && steps.app-changes.outputs.any_changed == 'true') || github.event_name == 'workflow_dispatch'
        run: python3 scripts/verify_version_impact.py

      - name: 6. 外部OSS依存関係なしの確認 (No Production Dependencies)
        id: verify-no-deps
        run: python3 scripts/audit_production_dependencies.py

      - name: 7. ESLint
        if: steps.changed-files.outputs.any_changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            npx eslint .
          else
            JS_FILES=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | grep -E '\.(js|cjs)$' || true)
            if [ -n "$JS_FILES" ]; then
              npx eslint $JS_FILES
            else
              echo "No JS files changed, skipping ESLint."
            fi
          fi

      - name: 8. Stylelint
        if: steps.changed-files.outputs.any_changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            npx stylelint "**/*.css"
          else
            CSS_FILES=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | grep '\.css$' || true)
            if [ -n "$CSS_FILES" ]; then
              npx stylelint $CSS_FILES
            else
              echo "No CSS files changed, skipping Stylelint."
            fi
          fi

      - name: 9. Jest tests
        if: steps.changed-files.outputs.any_changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            npm test
          else
            JS_FILES=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | grep -E '\.(js|cjs)$' || true)
            if [ -n "$JS_FILES" ]; then
              npm test -- --findRelatedTests $JS_FILES --passWithNoTests
            else
              echo "No JS files changed, running all tests as fallback."
              npm test
            fi
          fi

      - name: 10. 透明性レポートのサマリー作成 (Transparency Report Summary)
        if: always()
        run: |
          echo "### Transparency Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.verify-no-deps.outcome }}" == "success" ]; then
            echo "- Pure Vanilla JS policy: passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Pure Vanilla JS policy: failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- Root cleanliness / policy / version checks: completed" >> $GITHUB_STEP_SUMMARY

  osv-scan:
    name: 脆弱性検査 (Vulnerability Scan)
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v1.9.1"
    with:
      scan-args: |-
        --recursive
        ./projects
        ./package.json

  e2e-tests:
    name: E2Eテスト (E2E Tests)
    needs: audit-and-quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright Dependencies (if cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Start local server
        run: python3 -m http.server 8080 &

      - name: Wait for local server
        run: npx wait-on http://localhost:8080 -t 30000

      - name: Run E2E tests
        run: npm run test:e2e -- --grep-invert "Animation Quality Evaluation"

  animation-tests:
    name: アニメーション品質テスト (Animation Quality)
    needs: audit-and-quality
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright Dependencies (if cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Start local server
        run: python3 -m http.server 8080 &

      - name: Run Animation Quality Evaluation
        run: npm run test:animation-eval

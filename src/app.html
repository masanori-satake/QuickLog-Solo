<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickLog-Solo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Montserrat:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=Open+Sans:wght@400;500;700&family=Roboto:wght@400;500;700&family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="css/m3-theme.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icon.svg">
    <meta name="theme-color" content="#2563eb">
</head>
<body class="theme-light">
    <div id="app">
        <header>
            <div id="header-btns">
                <button id="copy-report-btn" title="日報コピー"><span class="material-symbols-outlined">content_paste</span></button>
                <button id="copy-aggregation-btn" title="集計コピー"><span class="material-symbols-outlined">assessment</span></button>
                <button id="settings-toggle" title="設定"><span class="material-symbols-outlined">settings</span></button>
            </div>
        </header>

        <main>
            <section id="category-section">
                <div id="category-list">
                    <!-- カテゴリボタンがここに動的に追加される -->
                </div>
                <div id="category-pagination">
                    <!-- ページインジケーター（点）がここに動的に追加される -->
                </div>
            </section>

            <section id="control-section">
                <canvas id="animation-canvas"></canvas>
                <div id="timer-container">
                    <div id="current-task-display">
                        <div id="current-task-display-base">
                            <h2 id="current-task-name">-</h2>
                            <div class="timer-box">
                                <span id="status-label" class="material-symbols-outlined">stop</span>
                                <div id="elapsed-time" class="hidden">00:00:00</div>
                            </div>
                        </div>

                        <div id="current-task-display-overlay">
                            <h2 id="current-task-name-overlay">-</h2>
                            <div class="timer-box">
                                <span id="status-label-overlay" class="material-symbols-outlined">stop</span>
                                <div id="elapsed-time-overlay" class="hidden">00:00:00</div>
                            </div>
                        </div>

                        <div id="clock-container" class="hidden">
                            <div id="clock-face">
                                <div id="clock-hand"></div>
                            </div>
                            <div id="sand-clock-face" class="hidden">
                                <div id="sand-top"></div>
                                <div id="sand-bottom"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="stop-btn-box">
                    <button id="pause-btn" disabled>
                        <span class="material-symbols-outlined btn-icon">pause</span>
                        <span class="btn-text">一時停止</span>
                    </button>
                    <button id="end-btn" disabled>
                        <span class="material-symbols-outlined btn-icon">stop</span>
                        <span class="btn-text">終了</span>
                    </button>
                </div>
            </section>

            <section id="log-section">
                <ul id="log-list">
                    <!-- ログアイテムがここに動的に追加される -->
                </ul>
            </section>
        </main>

        <!-- Settings Popup -->
        <div id="settings-popup" class="modal hidden">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                <h2>設定</h2>

                <div class="tabs">
                    <button class="tab-btn active" data-tab="general">一般</button>
                    <button class="tab-btn" data-tab="categories">カテゴリ</button>
                    <button class="tab-btn" data-tab="maintenance">メンテナンス</button>
                    <button class="tab-btn" data-tab="about">About</button>
                </div>

                <div id="general-tab" class="tab-content">
                    <div class="setting-item">
                        <label>テーマ</label>
                        <select id="theme-select">
                            <option value="system">システム設定に従う</option>
                            <option value="light">ライトモード</option>
                            <option value="dark">ダークモード</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>表示フォント</label>
                        <select id="font-select">
                            <!-- JSで生成 -->
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>背景アニメーション</label>
                        <select id="animation-select">
                            <option value="left-to-right">Left to Right</option>
                            <option value="right-to-left">Right to Left</option>
                            <option value="clock">Clock (Default)</option>
                            <option value="sand-clock">Sand Clock</option>
                            <option value="tetris-building">Tetris Building</option>
                            <option value="plant-growth">Plant Growth</option>
                            <option value="dot-typing">Dot Typing</option>
                            <option value="newtons-cradle">Newton's Cradle</option>
                            <option value="ripple">Ripple</option>
                            <option value="lissajous-pendulum">Lissajous Pendulum</option>
                            <option value="migrating-birds">Migrating Birds</option>
                            <option value="coffee-drip">Coffee Drip</option>
                            <option value="night-sky">Night Sky</option>
                            <option value="kaleidoscope">Kaleidoscope</option>
                            <option value="contour-lines">Contour Lines</option>
                            <option value="matrix-code">Matrix Code</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <button id="export-csv-btn">CSVエクスポート</button>
                        <button id="import-csv-btn">CSVインポート</button>
                        <input type="file" id="csv-file-input" style="display:none" accept=".csv">
                    </div>
                </div>

                <div id="categories-tab" class="tab-content hidden">
                    <div id="category-editor-list">
                        <!-- カテゴリ編集アイテムがここに動的に追加される -->
                    </div>
                    <div id="add-category-box-settings">
                        <input type="text" id="new-category-name-settings" placeholder="新しいカテゴリ...">
                        <button id="add-category-btn-settings">+</button>
                    </div>

                    <div class="category-maintenance-box" style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--md-sys-color-outline-variant);">
                        <div class="setting-item">
                            <label>カテゴリーのバックアップ</label>
                            <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                                <button id="export-categories-btn" style="flex: 1;">エクスポート (JSON)</button>
                                <button id="import-categories-btn" style="flex: 1;">インポート (JSON)</button>
                            </div>
                            <div style="display: flex; align-items: center; gap: 1rem; font-size: 0.8rem;">
                                <span>インポート設定:</span>
                                <label style="display: flex; align-items: center; gap: 4px; margin: 0; cursor: pointer;">
                                    <input type="radio" name="import-mode" value="append" checked style="width: auto;"> 追記
                                </label>
                                <label style="display: flex; align-items: center; gap: 4px; margin: 0; cursor: pointer;">
                                    <input type="radio" name="import-mode" value="overwrite" style="width: auto;"> 上書き
                                </label>
                            </div>
                            <input type="file" id="category-file-input" style="display:none" accept=".json">
                        </div>
                    </div>
                </div>

                <div id="about-tab" class="tab-content hidden">
                    <div class="setting-item">
                        <label>バージョン</label>
                        <p id="version-display"></p>
                    </div>
                    <div class="setting-item">
                        <label>開発者</label>
                        <p>Masanori SATAKE</p>
                    </div>
                    <div class="setting-item">
                        <label>QuickLog-Solo について</label>
                        <p style="font-size: 0.85rem; line-height: 1.6;">
                            QuickLog-Solo は、プライバシー重視のミニマリストな作業ログツールです。データはブラウザ内の IndexedDB にのみ保存され、外部送信は一切行われません。外部ライブラリを使用しない軽量・セキュアな設計で、サイドパネルからいつでも素早く記録できます。
                        </p>
                    </div>
                </div>

                <div id="maintenance-tab" class="tab-content hidden">
                    <div class="setting-item">
                        <label>ログの削除</label>
                        <button id="clear-logs-btn" class="danger-btn" style="width: 100%;">ログをすべて削除</button>
                    </div>
                    <div class="setting-item">
                        <label>設定とカテゴリの初期化</label>
                        <p style="font-size: 0.75rem; margin-bottom: 0.5rem; color: var(--muted-color);">
                            ログは維持されます。
                        </p>
                        <button id="reset-cat-settings-btn" style="width: 100%;">カテゴリ・設定を初期化</button>
                    </div>
                    <div class="setting-item">
                        <label>設定のみの初期化</label>
                        <p style="font-size: 0.75rem; margin-bottom: 0.5rem; color: var(--muted-color);">
                            ログとカテゴリは維持されます。
                        </p>
                        <button id="reset-settings-btn" style="width: 100%;">設定のみを初期化</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="confirm-modal" class="modal hidden">
            <div class="modal-content">
                <p id="confirm-message">本当に作業を終了しますか？</p>
                <div class="confirm-btns">
                    <button id="confirm-cancel-btn">キャンセル</button>
                    <button id="confirm-ok-btn">OK</button>
                </div>
            </div>
        </div>

        <div id="toast" class="hidden">コピーしました！</div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>

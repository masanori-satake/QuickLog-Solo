<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QL-Category Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Fira+Code:wght@400;500&family=Noto+Color+Emoji&family=Noto+Sans+JP:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="src/css/m3-theme.css">
    <link rel="stylesheet" href="src/css/category-editor.css">
    <link rel="icon" href="src/assets/icon.svg" type="image/svg+xml">
</head>
<body class="theme-dark">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('category-editor-theme');
            if (savedTheme === 'light') document.body.classList.replace('theme-dark', 'theme-light');
            else if (!savedTheme && window.matchMedia && !window.matchMedia('(prefers-color-scheme: dark)').matches) document.body.classList.replace('theme-dark', 'theme-light');
        })();
    </script>
    <div id="editor-app">
        <header class="editor-header">
            <div class="header-content-wrapper">
                <div class="header-left">
                    <a href="index.html" class="back-link" data-i18n-title="back-to-landing">
                        <span class="material-symbols-outlined">arrow_back</span>
                    </a>
                    <h1 id="editor-title-heading"><span class="material-symbols-outlined">edit_note</span> <span data-i18n="category-editor-title">QL-Category Editor</span></h1>
                    <div class="theme-switch-wrapper">
                        <span class="material-symbols-outlined">light_mode</span>
                        <label class="theme-switch" for="theme-toggle">
                            <input type="checkbox" id="theme-toggle" />
                            <div class="slider round"></div>
                        </label>
                        <span class="material-symbols-outlined">dark_mode</span>
                    </div>
                </div>
                <div class="header-right">
                    <div class="lang-switcher">
                        <select id="lang-select-editor" class="lang-select">
                            <option value="en">English</option>
                            <option value="ja">日本語</option>
                            <option value="de">Deutsch</option>
                            <option value="es">Español</option>
                            <option value="fr">Français</option>
                            <option value="pt">Português</option>
                            <option value="ko">한국어</option>
                            <option value="zh">简体中文</option>
                        </select>
                    </div>
                </div>
            </div>
        </header>

        <main class="editor-main">
            <div class="main-content-wrapper">
            <div class="list-pane">
                <section class="category-list-section card">
                    <div class="section-header">
                        <h2 class="section-title"><span class="material-symbols-outlined">list</span> <span data-i18n="tab-categories">Categories</span></h2>
                        <div class="header-actions">
                            <button id="add-category-btn" class="icon-btn" data-i18n-title="placeholder-new-category"><span class="material-symbols-outlined">add</span></button>
                        </div>
                    </div>
                    <div id="category-list" class="category-list">
                        <!-- Category items will be populated here -->
                    </div>
                    <div class="list-footer-actions">
                        <button id="add-page-break-btn" class="tertiary-btn full-width">
                            <span class="material-symbols-outlined">insert_page_break</span>
                            <span data-i18n="btn-add-page-break">Add Page Break</span>
                        </button>
                    </div>
                </section>
            </div>

            <div class="edit-pane">
                <section id="detail-section" class="detail-section card hidden">
                    <h2 class="section-title"><span class="material-symbols-outlined">edit</span> <span data-i18n="category-detail">Category Detail</span></h2>
                    <div class="edit-form">
                        <div class="input-group">
                            <label data-i18n="label-name">Name</label>
                            <input type="text" id="edit-name" placeholder="Category Name">
                        </div>
                        <div class="input-group">
                            <label data-i18n="tags">Tags</label>
                            <div class="tag-editor">
                                <div id="tag-list" class="tag-list"></div>
                                <input type="text" id="tag-input" data-i18n-placeholder="placeholder-tags" placeholder="Add tags...">
                            </div>
                        </div>
                        <div class="input-row">
                            <div class="input-group">
                                <label data-i18n="setting-theme">Color</label>
                                <div id="color-palette" class="color-palette">
                                    <!-- Colors will be populated here -->
                                </div>
                            </div>
                            <div class="input-group">
                                <label data-i18n="setting-animation">Animation</label>
                                <select id="edit-animation">
                                    <!-- Animations will be populated here -->
                                </select>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="preview-section card">
                    <h2 class="section-title"><span class="material-symbols-outlined">visibility</span> <span data-i18n="section-preview">Preview</span></h2>
                    <div id="preview-container" class="preview-container">
                        <canvas id="animation-canvas"></canvas>
                        <div id="preview-overlay-base" class="preview-overlay-base">
                            <h3 id="preview-name-heading"><span id="preview-name">(Category Name)</span></h3>
                            <div class="preview-timer-box">
                                <span class="material-symbols-outlined">play_arrow</span>
                                <div class="preview-elapsed">00:04:20</div>
                            </div>
                        </div>
                    </div>
                </section>

                <section id="code-section" class="code-section card collapsed">
                    <div class="console-header" id="code-header">
                        <h2 class="section-title"><span class="material-symbols-outlined">code</span> <span data-i18n="section-code-view">NDJSON View</span></h2>
                        <button id="toggle-code" class="icon-btn">
                            <span class="material-symbols-outlined">expand_less</span>
                        </button>
                    </div>
                    <div class="code-container">
                        <pre id="code-view" class="code-view"></pre>
                    </div>
                </section>
            </div>
            </div>
        </main>

        <footer class="editor-footer">
            <div class="footer-content-wrapper">
                <div class="footer-left">
                    <button id="new-start-btn" class="secondary-btn">
                        <span class="material-symbols-outlined">auto_awesome</span>
                        <span data-i18n="btn-new-start">Start from Default</span>
                    </button>
                    <button id="clear-all-btn" class="tertiary-btn">
                        <span class="material-symbols-outlined">delete_sweep</span>
                        <span data-i18n="btn-clear-all">Clear All</span>
                    </button>
                </div>
                <div class="footer-right">
                    <button id="import-btn" class="secondary-btn">
                        <span class="material-symbols-outlined">upload</span>
                        <span data-i18n="btn-import-json">Import NDJSON</span>
                    </button>
                    <button id="export-btn" class="primary-btn">
                        <span class="material-symbols-outlined">download</span>
                        <span data-i18n="btn-export-json">Export NDJSON</span>
                    </button>
                </div>
            </div>
            <input type="file" id="import-input" style="display:none" accept=".ndjson">
        </footer>
    </div>

    <div id="toast" class="hidden"></div>

    <script type="module" src="src/js/category-editor.js"></script>
</body>
</html>

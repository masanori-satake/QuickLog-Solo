<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="alarm-editor-title">Alarm Editor - QuickLog-Solo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="shared/css/m3-theme.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="shared/assets/icon.svg" type="image/svg+xml">
</head>
<body class="theme-light">
    <div id="app" class="editor-layout">
        <header class="editor-header">
            <div class="header-main">
                <h1 data-i18n="alarm-editor-title">アラームエディタ</h1>
                <div class="header-actions">
                    <button id="export-btn" class="secondary-btn">
                        <span class="material-symbols-outlined">content_copy</span>
                        <span data-i18n="btn-export-json">コピー (Export)</span>
                    </button>
                    <button id="import-btn" class="secondary-btn">
                        <span class="material-symbols-outlined">content_paste</span>
                        <span data-i18n="btn-import-json">貼り付け (Import)</span>
                    </button>
                </div>
            </div>
            <div class="business-days-section">
                <label data-i18n="business-days">稼働曜日</label>
                <div id="business-days-container" class="filter-chips"></div>
            </div>
        </header>

        <main class="editor-main">
            <div id="alarm-editor-list" class="alarm-grid">
                <!-- Alarms will be rendered here -->
            </div>
        </main>

        <footer class="editor-footer">
            <div class="footer-info">
                <p data-i18n="privacy-policy-local-only">全てブラウザ内で処理が完結しており、外部のサーバとは連携していません。</p>
            </div>
            <a href="../app/app.html" class="back-link">
                <span class="material-symbols-outlined">arrow_back</span>
                <span data-i18n="back-to-app">アプリに戻る</span>
            </a>
        </footer>

        <div id="toast" class="hidden"></div>
        <div id="confirm-modal" class="modal hidden">
            <div class="modal-content">
                <p id="confirm-message"></p>
                <div class="confirm-btns">
                    <button id="confirm-cancel-btn" data-i18n="confirm-cancel">キャンセル</button>
                    <button id="confirm-ok-btn" class="primary-btn">OK</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="js/alarm-editor.js"></script>
</body>
</html>
